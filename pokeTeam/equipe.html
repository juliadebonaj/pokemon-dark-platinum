<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Equipe</title>
    <link rel="stylesheet" href="equipe.css">
    <link rel="stylesheet" href="../theme/tema.css">
    <link rel="stylesheet" href="../theme/musica.css">
    <link rel="stylesheet" href="../theme/overlays.css">
    <script src="../theme/tema.js"></script>
    <script src="../theme/musica.js" defer></script>
    <script src="../theme/overlays.js"></script>
    <script src="../theme/guard.js"></script>
</head>

<!--Toggle modo escuro ou modo claro-->
<body>
    <label class="toggle-tema-wrapper" for="toggle-tema">
        <input type="checkbox" id="toggle-tema" class="toggle-tema-input">
        <span class="toggle-tema-label">
            <span class="toggle-tema-thumb"></span>
        </span>
    </label>

    <!--Título visível-->
    <header>
        <h1>Pokemon Dark Platinum</h1>
    </header>

    <main>
        <!--Info do nosso treinador (Valdo)-->
        <section class="treinador-info">
            <img id="sprite-treinador" class="sprite-treinador" src="" alt="Sprite do Treinador">
            <div class="treinador-dados">
                <h2 id="nome-treinador">Treinador</h2>
                <p id="idade-treinador" class="idade-treinador"></p>
            </div>
            <!--Botão de logout-->
            <button id="btn-logout" class="btn-logout" type="button" title="Sair / Resetar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </button>
        </section>

        <!--Barra relacionada ao contador de selecionados-->
        <div class="status-barra">
            <h3 class="status-equipe">Nenhum Pokemon capturado</h3>
            <!--Botão de resetar seleção-->
            <button id="btn-resetar" class="btn-resetar" type="button" disabled title="Resetar equipe">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                Resetar
            </button>
        </div>

        <!--Slots da equipe-->
        <section id="slots-equipe" class="slots-equipe"></section>

        <!--Ações a tomar: editar ou remover-->
        <div class="acoes-equipe">
            <button id="btn-escolher" class="btn-escolher" type="button">Escolher Equipe</button>
            <button id="btn-confirmar" class="btn-confirmar" type="button" hidden>Confirmar Equipe</button>
        </div>
    </main>

    <!--Puxando a lógica de script.js-->
    <script src="equipe.js"></script>
</body>

</html>
