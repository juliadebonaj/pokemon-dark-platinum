<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha Sua Equipe Pokemon</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="../theme/tema.css">
    <link rel="stylesheet" href="../theme/musica.css">
    <link rel="stylesheet" href="../theme/overlays.css">
    <script src="../theme/tema.js"></script>
    <script src="../theme/musica.js" defer></script>
    <script src="../theme/overlays.js"></script>
    <script src="../theme/guard.js"></script>
</head>

<body>
    <!--Toggle modo escuro ou modo claro-->
    <label class="toggle-tema-wrapper" for="toggle-tema">
        <input type="checkbox" id="toggle-tema" class="toggle-tema-input">
        <span class="toggle-tema-label">
            <span class="toggle-tema-thumb"></span>
        </span>
    </label>

    <!--Título visível-->
    <header>
        <h1>Pokemon Dark Platinum</h1>
    
        <!--Info do nosso treinador (Valdo)-->
        <section id="treinador-info" class="treinador-info-mini">
            <img id="sprite-treinador" class="sprite-treinador-mini" src="" alt="Sprite do Treinador">
            <h2 id="nome-treinador" class="nome-treinador-mini">Treinador</h2>
            <!--Botão de sair-->
            <button id="btn-logout" class="btn-logout" type="button" title="Sair / Resetar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sair
            </button>
        </section>

        <!--Balão de texto de equipe - contador de selecionados-->
        <div class="equipe-barra">
            <div id="contador-selecao" class="contador-selecao">Equipe: 0 / 6</div>
            <button id="btn-ver-equipe" class="btn-ver-equipe" type="button" title="Ver equipe atual">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Ver Equipe
            </button>
            <!--Botão resetar seleção-->
            <button id="btn-resetar" class="btn-resetar" type="button" title="Resetar seleção">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                Resetar
            </button>
        </div>

        <!--Filtro e barra de pesquisa-->
        <div class="filtro-barra">
            <span class="filtro-icone-busca">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <input type="text" id="busca-nome" class="busca-input" placeholder="Buscar por nome...">
            <div class="filtro-wrapper">
                <span class="filtro-icone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                    </svg>
                </span>
                <select id="filtro-tipo" class="filtro-select"></select>
            </div>
        </div>
    </header>

    <!--Pokedex: puxa os pokemons da API-->
    <main id="pokedex-container" class="pokedex-container"></main>

    <!--Aviso que aparece ao selecionar o máximode pokemons possível-->
    <div id="overlay-final" class="overlay-final">
        <div class="overlay-conteudo">
            <h2>Equipe Completa!</h2>
            <p>Sua equipe de pokemons está pronta para a aventura.</p>
            <button id="btn-comecar-aventura" class="btn-comecar-aventura" type="button">Começar Aventura</button>
        </div>
    </div>

    <!--Puxando a lógica de script.js-->
    <script src="index.js"></script>
</body>

</html>
